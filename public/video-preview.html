<!DOCTYPE html>
<html>
<head>
<title>Video Preview</title>
<style>
body { margin: 0; background: #111; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
video { max-width: 100%; max-height: 90vh; }
#info { position: fixed; top: 10px; left: 10px; color: #fff; font-family: monospace; font-size: 14px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 6px; }
</style>
</head>
<body>
<div id="info">Loading...</div>
<video id="vid" controls autoplay muted loop>
  <source src="/videos/hero-scroll.mp4" type="video/mp4">
</video>
<script>
const v = document.getElementById('vid');
v.addEventListener('loadedmetadata', () => {
  document.getElementById('info').textContent =
    `${v.videoWidth}x${v.videoHeight} | ${v.duration.toFixed(1)}s | ${(1732939/1024/1024).toFixed(1)}MB`;
});
</script>
</body>
</html>
